<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Multi-Liga</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap');

  :root {
    --bg: #080c18;
    --surface: #0f1624;
    --surface2: #162032;
    --border: #1e2d45;
    --text: #e8edf5;
    --muted: #5a6a88;
    --local: #22d3ee;
    --empate: #a78bfa;
    --visita: #fb923c;
    --gold: #fbbf24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding-bottom: 90px;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(180deg,#0d1321 0%,#080c18 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 16px 14px;
    text-align: center;
    position: sticky; top: 0; z-index: 100;
  }
  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px; font-weight: 900; letter-spacing: 2px;
  }
  .header-title span { color: var(--gold); }
  .prog-wrap { background: var(--border); border-radius: 99px; height: 5px; margin: 10px auto 0; max-width: 320px; overflow: hidden; }
  .prog-fill { background: linear-gradient(90deg,var(--gold),#f97316); height: 100%; border-radius: 99px; transition: width .4s ease; width:0%; }
  .prog-label { font-size: 10px; color: var(--muted); margin-top: 5px; letter-spacing: .5px; }

  /* ── LEYENDA ── */
  .legend { display:flex; gap:16px; justify-content:center; margin:14px 12px 4px; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:600; color:var(--muted); }
  .ldot { width:8px;height:8px;border-radius:50%; }

  /* ── LIGA SECTION ── */
  .liga-section { margin: 16px 10px 0; }
  .liga-header {
    display:flex; align-items:center; gap:10px;
    padding:9px 14px; border-radius:10px;
    border-left:4px solid var(--lc);
    background:linear-gradient(90deg,rgba(255,255,255,.04),transparent);
    margin-bottom:10px;
  }
  .liga-flag { font-size:20px; }
  .liga-name { font-family:'Barlow Condensed',sans-serif; font-size:19px; font-weight:900; letter-spacing:1.5px; color:var(--lc); text-transform:uppercase; }
  .liga-badge { margin-left:auto; font-size:9px; font-weight:700; letter-spacing:1px; color:var(--muted); border:1px solid var(--border); padding:2px 8px; border-radius:99px; }

  /* ── MATCH CARD ── */
  .match-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color .2s, transform .15s;
  }
  .match-card:hover { transform:translateY(-1px); }
  .match-card.picked { border-color: var(--pc, var(--gold)); }

  .match-top {
    display:grid; grid-template-columns:1fr auto 1fr;
    align-items:center; padding:14px 10px 10px; gap:6px;
  }
  .team { display:flex; flex-direction:column; align-items:center; gap:7px; }

  /* ── ESCUDO SVG ── */
  .escudo {
    width:48px; height:48px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:900;
    font-family:'Barlow Condensed',sans-serif;
    letter-spacing:.5px;
    flex-shrink:0;
    position:relative;
    overflow:hidden;
    box-shadow: 0 2px 10px rgba(0,0,0,.5);
  }
  .escudo svg { width:44px; height:44px; }

  .team-name {
    font-size:10px; font-weight:700; text-align:center;
    color:var(--text); letter-spacing:.3px; line-height:1.2;
    max-width:72px; word-break:break-word;
  }

  .vs-block { display:flex; flex-direction:column; align-items:center; gap:3px; }
  .vs-text { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:900; color:var(--muted); line-height:1; }
  .match-num { font-size:9px; color:var(--muted); font-weight:600; letter-spacing:.5px; }

  /* ── LEV BUTTONS ── */
  .lev-buttons { display:grid; grid-template-columns:1fr 1fr 1fr; border-top:1px solid var(--border); }
  .lev-btn {
    background:none; border:none; cursor:pointer;
    padding:9px 4px;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    transition:background .2s; position:relative;
    font-family:'Inter',sans-serif;
  }
  .lev-btn+.lev-btn { border-left:1px solid var(--border); }
  .lev-btn:hover { background:rgba(255,255,255,.04); }
  .lev-letter { font-family:'Barlow Condensed',sans-serif; font-size:19px; font-weight:900; letter-spacing:1px; transition:color .2s; }
  .lev-label { font-size:8px; font-weight:700; letter-spacing:.5px; color:var(--muted); text-transform:uppercase; transition:color .2s; }

  .lev-btn[data-pick="L"] .lev-letter { color:var(--local); }
  .lev-btn[data-pick="E"] .lev-letter { color:var(--empate); }
  .lev-btn[data-pick="V"] .lev-letter { color:var(--visita); }

  .lev-btn[data-pick="L"].active, .lev-btn[data-pick="L"]:hover { background:rgba(34,211,238,.12); }
  .lev-btn[data-pick="E"].active, .lev-btn[data-pick="E"]:hover { background:rgba(167,139,250,.12); }
  .lev-btn[data-pick="V"].active, .lev-btn[data-pick="V"]:hover { background:rgba(251,146,60,.12); }

  .lev-btn.active .lev-label { color:inherit; }
  .lev-btn[data-pick="L"].active .lev-label { color:var(--local); }
  .lev-btn[data-pick="E"].active .lev-label { color:var(--empate); }
  .lev-btn[data-pick="V"].active .lev-label { color:var(--visita); }

  .lev-btn.active::after {
    content:''; position:absolute; bottom:0; left:15%; right:15%;
    height:3px; border-radius:3px 3px 0 0;
  }
  .lev-btn[data-pick="L"].active::after { background:var(--local); }
  .lev-btn[data-pick="E"].active::after { background:var(--empate); }
  .lev-btn[data-pick="V"].active::after { background:var(--visita); }

  /* ── FOOTER ── */
  .footer {
    position:fixed; bottom:0; left:0; right:0;
    background:rgba(8,12,24,.96); backdrop-filter:blur(16px);
    border-top:1px solid var(--border);
    padding:10px 14px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .chips { display:flex; gap:4px; flex-wrap:wrap; flex:1; }
  .chip {
    font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:900;
    padding:2px 9px; border-radius:99px;
    background:var(--surface2); border:1px solid var(--border); color:var(--muted);
    transition:all .2s;
  }
  .chip.L { background:rgba(34,211,238,.15); border-color:var(--local); color:var(--local); }
  .chip.E { background:rgba(167,139,250,.15); border-color:var(--empate); color:var(--empate); }
  .chip.V { background:rgba(251,146,60,.15); border-color:var(--visita); color:var(--visita); }

  .btn-ver {
    background:linear-gradient(135deg,var(--gold),#f97316);
    color:#080c18; font-family:'Barlow Condensed',sans-serif;
    font-size:14px; font-weight:900; letter-spacing:1px;
    border:none; border-radius:9px; padding:9px 16px;
    cursor:pointer; white-space:nowrap; transition:opacity .2s;
  }
  .btn-ver:hover { opacity:.85; }
  .btn-ver:disabled { opacity:.35; cursor:default; }

  /* ── MODAL ── */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:200; align-items:center; justify-content:center; padding:16px; }
  .overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:22px; max-width:370px; width:100%; }
  .modal h3 { font-family:'Barlow Condensed',sans-serif; font-size:21px; font-weight:900; color:var(--gold); margin-bottom:14px; letter-spacing:1px; }
  .modal-row { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:7px 10px; background:var(--surface2); border-radius:8px; margin-bottom:5px; font-size:11px; }
  .modal-teams { color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .modal-pick { font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:900; width:24px; text-align:center; }
  .modal-pick.L{color:var(--local)}.modal-pick.E{color:var(--empate)}.modal-pick.V{color:var(--visita)}
  .modal-liga-title { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin:10px 0 5px; }
  .modal-actions { display:flex; gap:9px; margin-top:16px; }
  .btn-close { flex:1; padding:9px; border-radius:9px; border:1px solid var(--border); background:none; color:var(--muted); cursor:pointer; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; }
  .btn-copy { flex:1; padding:9px; border-radius:9px; border:none; background:linear-gradient(135deg,var(--gold),#f97316); color:#080c18; cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:900; letter-spacing:1px; }

  .sep { height:1px; background:var(--border); margin:6px 10px 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">⚽ QUINIELA <span>MULTI-LIGA</span></div>
  <div class="prog-wrap"><div class="prog-fill" id="pb"></div></div>
  <div class="prog-label" id="pl">0 de 12 seleccionados</div>
</div>

<div class="legend">
  <div class="legend-item"><div class="ldot" style="background:var(--local)"></div>L = Local</div>
  <div class="legend-item"><div class="ldot" style="background:var(--empate)"></div>E = Empate</div>
  <div class="legend-item"><div class="ldot" style="background:var(--visita)"></div>V = Visita</div>
</div>

<div id="app"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>🎯 TU QUINIELA</h3>
    <div id="mc"></div>
    <div class="modal-actions">
      <button class="btn-close" onclick="closeModal()">Cerrar</button>
      <button class="btn-copy" onclick="copyPicks()">📋 COPIAR</button>
    </div>
  </div>
</div>

<div class="footer">
  <div class="chips" id="chips"></div>
  <button class="btn-ver" id="btnVer" onclick="openModal()" disabled>VER QUINIELA</button>
</div>

// ══════════════════════════════════════
// DATOS DE LIGAS Y PARTIDOS
// ══════════════════════════════════════
const LIGAS = [
  {
    id:'mx', nombre:'Liga MX', bandera:'🇲🇽', color:'#00C76A',
    partidos:[
      { id:'mx1', local:{n:'América',     k:'america'},   visita:{n:'Guadalajara', k:'chivas'} },
      { id:'mx2', local:{n:'Cruz Azul',   k:'cruzazul'},  visita:{n:'Pumas UNAM',  k:'pumas'} },
      { id:'mx3', local:{n:'Monterrey',   k:'monterrey'}, visita:{n:'Tigres UANL', k:'tigres'} },
      { id:'mx4', local:{n:'Atlas',       k:'atlas'},     visita:{n:'León',        k:'leon'} },
    ]
  },
  {
    id:'es', nombre:'LaLiga', bandera:'🇪🇸', color:'#FF6B1A',
    partidos:[
      { id:'es1', local:{n:'Real Madrid',   k:'realmadrid'}, visita:{n:'Barcelona',     k:'barcelona'} },
      { id:'es2', local:{n:'Atlético Mad',  k:'atletico'},   visita:{n:'Sevilla',        k:'sevilla'} },
      { id:'es3', local:{n:'Valencia',      k:'valencia'},   visita:{n:'Villarreal',     k:'villarreal'} },
      { id:'es4', local:{n:'Ath. Bilbao',   k:'athletic'},   visita:{n:'Real Sociedad',  k:'realsociedad'} },
    ]
  },
  {
    id:'fr', nombre:'Ligue 1', bandera:'🇫🇷', color:'#4D9EFF',
    partidos:[
      { id:'fr1', local:{n:'PSG',       k:'psg'},       visita:{n:'Ol. Lyon',   k:'lyon'} },
      { id:'fr2', local:{n:'Marseille', k:'marseille'}, visita:{n:'AS Monaco',  k:'monaco'} },
      { id:'fr3', local:{n:'OGC Nice',  k:'nice'},      visita:{n:'RC Lens',    k:'lens'} },
      { id:'fr4', local:{n:'LOSC Lille',k:'lille'},     visita:{n:'Stade Rennes',k:'rennes'} },
    ]
  }
];

const picks = {};

function escudo(key) {
  return `<div class="escudo">${ESCUDOS[key] || `<div style="background:#1e2d45;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;color:#5a6a88;font-weight:900;">${key.substring(0,3).toUpperCase()}</div>`}</div>`;
}

function cardHTML(p, liga, num) {
  const pick = picks[p.id];
  const pc = pick==='L'?'var(--local)':pick==='E'?'var(--empate)':pick==='V'?'var(--visita)':'transparent';
  return `
  <div class="match-card ${pick?'picked':''}" id="card-${p.id}" style="--pc:${pc}">
    <div class="match-top">
      <div class="team">
        ${escudo(p.local.k)}
        <div class="team-name">${p.local.n}</div>
      </div>
      <div class="vs-block">
        <div class="vs-text">VS</div>
        <div class="match-num">#${num}</div>
      </div>
      <div class="team">
        ${escudo(p.visita.k)}
        <div class="team-name">${p.visita.n}</div>
      </div>
    </div>
    <div class="lev-buttons">
      <button class="lev-btn ${pick==='L'?'active':''}" data-pick="L" onclick="setPick('${p.id}','L')">
        <span class="lev-letter">L</span><span class="lev-label">Local</span>
      </button>
      <button class="lev-btn ${pick==='E'?'active':''}" data-pick="E" onclick="setPick('${p.id}','E')">
        <span class="lev-letter">E</span><span class="lev-label">Empate</span>
      </button>
      <button class="lev-btn ${pick==='V'?'active':''}" data-pick="V" onclick="setPick('${p.id}','V')">
        <span class="lev-letter">V</span><span class="lev-label">Visita</span>
      </button>
    </div>
  </div>`;
}

function render() {
  document.getElementById('app').innerHTML = LIGAS.map((liga,li) => `
    ${li>0?'<div class="sep"></div>':''}
    <div class="liga-section">
      <div class="liga-header" style="--lc:${liga.color}">
        <span class="liga-flag">${liga.bandera}</span>
        <span class="liga-name">${liga.nombre}</span>
        <span class="liga-badge">4 partidos</span>
      </div>
      ${liga.partidos.map((p,i)=>cardHTML(p,liga,i+1)).join('')}
    </div>
  `).join('');
}

function setPick(id, op) {
  picks[id] = picks[id]===op ? undefined : op;
  if (!picks[id]) delete picks[id];
  refreshCard(id);
  updateUI();
}

function refreshCard(id) {
  const liga = LIGAS.find(l=>l.partidos.some(p=>p.id===id));
  const partido = liga.partidos.find(p=>p.id===id);
  const card = document.getElementById('card-'+id);
  if(!card) return;
  const pick = picks[id];
  const pc = pick==='L'?'var(--local)':pick==='E'?'var(--empate)':pick==='V'?'var(--visita)':'transparent';
  card.style.setProperty('--pc', pc);
  card.classList.toggle('picked', !!pick);
  ['L','E','V'].forEach(o=>{
    card.querySelector(`[data-pick="${o}"]`)?.classList.toggle('active', pick===o);
  });
}

function updateUI() {
  const done = Object.keys(picks).length;
  document.getElementById('pb').style.width = (done/12*100)+'%';
  document.getElementById('pl').textContent = `${done} de 12 seleccionados`;
  document.getElementById('btnVer').disabled = done < 12;

  const all = LIGAS.flatMap(l=>l.partidos);
  document.getElementById('chips').innerHTML = all.map(p=>{
    const pk = picks[p.id];
    return `<span class="chip ${pk||''}">${pk||'·'}</span>`;
  }).join('');
}

function openModal() {
  document.getElementById('mc').innerHTML = LIGAS.map(liga=>`
    <div class="modal-liga-title" style="color:${liga.color}">${liga.bandera} ${liga.nombre}</div>
    ${liga.partidos.map(p=>`
      <div class="modal-row">
        <span class="modal-teams">${p.local.n} vs ${p.visita.n}</span>
        <span class="modal-pick ${picks[p.id]}">${picks[p.id]||'?'}</span>
      </div>
    `).join('')}
  `).join('');
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function copyPicks() {
  let txt = '⚽ MI QUINIELA MULTI-LIGA\n\n';
  LIGAS.forEach(l=>{
    txt += `${l.bandera} ${l.nombre}\n`;
    l.partidos.forEach(p=>{ txt+=`  ${p.local.n} vs ${p.visita.n} → ${picks[p.id]||'?'}\n`; });
    txt+='\n';
  });
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.querySelector('.btn-copy');
    b.textContent='✅ COPIADO';
    setTimeout(()=>b.textContent='📋 COPIAR',2000);
  });
}

document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('overlay')) closeModal(); });

render();
updateUI();
</script>
